<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>منصة حلل المعرفة الإدارية — النموذج التفاعلي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-page:#F3F1EA; --bg-card:#FFFFFF; --bg-elev:#FBFAF6; --bg-input:#FBFAF6;
  --bd-1:#E6E1D4; --bd-2:#D8D0BE;
  --tx-1:#13303B; --tx-2:#284049; --tx-3:#5E6E73;
  --navy:#0F3446; --navy-2:#17475C; --navy-3:#1E5A72; --navy-soft:#E7EEF1;
  --heading:#0F3446; --navy-txt:#17475C;
  --primary:#1E8E77; --primary-hov:#0E5F4E; --primary-soft:#E6F2EE; --on-primary:#FFFFFF;
  --teal-2:#27A588;
  --gold:#C4A052; --gold-2:#AC8938; --gold-soft:#F6EFDD; --gold-strong:#AC8938; --on-gold:#0F3446;
  --ok:#1E8E77; --ok-soft:#E6F2EE; --err:#C0553E; --err-soft:#F7E8E2; --ring:#27A588;
  --sh-sm:0 1px 2px rgba(15,52,70,.05), 0 8px 24px rgba(15,52,70,.06);
  --sh-md:0 8px 26px rgba(15,52,70,.13); --sh-xl:0 24px 60px rgba(15,52,70,.22);
  --r:16px; --r-sm:11px; --r-lg:22px;
}
[data-theme="dark"]{
  --bg-page:#081C26; --bg-card:#0F2E3B; --bg-elev:#143A4A; --bg-input:#0C2833;
  --bd-1:rgba(255,255,255,.08); --bd-2:rgba(255,255,255,.17);
  --tx-1:#EAF2F1; --tx-2:#AEC4C8; --tx-3:#7B939A;
  --navy:#0F3446; --navy-2:#17475C; --navy-3:#1E5A72; --navy-soft:rgba(30,90,114,.35);
  --heading:#EAF2F1; --navy-txt:#9FBECA;
  --primary:#2FB79A; --primary-hov:#5CD0B6; --primary-soft:rgba(47,183,154,.16); --on-primary:#052018;
  --teal-2:#2FB79A;
  --gold:#D2B15E; --gold-2:#E1C377; --gold-soft:rgba(196,160,82,.17); --gold-strong:#E1C377; --on-gold:#081C26;
  --ok:#2FB79A; --ok-soft:rgba(47,183,154,.16); --err:#E0806B; --err-soft:rgba(224,128,107,.16); --ring:#2FB79A;
  --sh-sm:0 2px 8px rgba(0,0,0,.35); --sh-md:0 8px 26px rgba(0,0,0,.45); --sh-xl:0 24px 60px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;font-variant-numeric:tabular-nums;background:var(--bg-page);color:var(--tx-1);font-size:15px;line-height:1.9;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{color:var(--heading);font-weight:700;line-height:1.4}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
a{color:var(--primary);text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--bd-2);border-radius:999px;border:3px solid transparent;background-clip:padding-box}
.num{font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:plaintext}
.hide{display:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ribbon */
.ribbon{background:var(--gold);color:var(--navy);text-align:center;font-size:11.5px;font-weight:600;padding:4px 10px}

/* ===== LOGIN ===== */
.login-wrap{min-height:100vh;display:grid;place-items:center;padding:40px 16px;background:radial-gradient(1100px 560px at 82% -12%,rgba(39,165,136,.28),transparent 60%),linear-gradient(135deg,#0F3446,#081C26)}
.login-card{width:100%;max-width:420px;background:var(--bg-card);border-radius:22px;box-shadow:0 34px 80px rgba(0,0,0,.34);padding:36px 32px;text-align:center;animation:fadeUp .5s}
.login-logo{height:44px;margin:0 auto 8px;color:var(--navy);display:block}
.login-card h1{font-size:22px}
.login-card .sub{color:var(--tx-3);font-size:13px;margin:4px 0 22px}
.field{text-align:right;margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--navy-txt);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1px solid var(--bd-1);border-radius:var(--r-sm);font-size:14px;background:var(--bg-input);color:var(--tx-1);transition:.18s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft);background:var(--bg-card)}
.btn{border:0;border-radius:var(--r-sm);padding:10px 16px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;justify-content:center;transition:.18s}
.btn svg{width:15px;height:15px}
.btn-primary{background:var(--primary);color:var(--on-primary)}.btn-primary:hover{background:var(--primary-hov)}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy-2)}
.btn-ghost{background:var(--bg-elev);color:var(--navy-txt);border:1px solid var(--bd-1)}.btn-ghost:hover{background:var(--navy-soft)}
.btn-gold{background:var(--gold);color:var(--on-gold);font-weight:700}.btn-gold:hover{background:var(--gold-2)}
.btn-sm{padding:6px 11px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-block{width:100%}
.hintchips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:16px}
.hintchips span{font-size:11px;color:var(--tx-3);width:100%;margin-bottom:2px}
.hintchips button{background:var(--primary-soft);color:var(--primary-hov);border:0;border-radius:999px;padding:6px 12px;font-size:11.5px;font-weight:600}
.hintchips button:hover{filter:brightness(.97)}

/* ===== APP SHELL ===== */
.app{display:flex;min-height:100vh;background:var(--bg-page);transition:background .3s}
.sidebar{width:266px;flex-shrink:0;background:var(--bg-card);border-inline-start:1px solid var(--bd-1);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sbrand{padding:18px 18px 14px}
.sbrand .box{display:flex;align-items:center;justify-content:center;padding:16px;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--navy),var(--navy-2));box-shadow:var(--sh-sm);position:relative;overflow:hidden}
.sbrand .box::before{content:"";position:absolute;inset-inline:0;top:0;height:3px;background:var(--gold);opacity:.75}
.sbrand .box svg{height:40px;width:auto;color:#fff;display:block}
.snav{padding:4px 12px 12px;flex:1}
.navlbl{font-size:10.5px;letter-spacing:1px;color:var(--tx-3);margin:14px 10px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:10px;font-size:13.5px;font-weight:500;color:var(--tx-2);margin-bottom:3px;position:relative;transition:.15s}
.nav-item svg{width:19px;height:19px;flex:none;stroke-width:1.8}
.nav-item:hover{background:var(--bg-elev)}
.nav-item.active{background:var(--primary-soft);color:var(--primary);font-weight:700}
.nav-item.active::before{content:"";position:absolute;inset-inline-start:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--primary)}
.nav-item .cnt{margin-inline-start:auto;font-size:10.5px;background:var(--navy-soft);color:var(--navy-txt);padding:1px 8px;border-radius:999px;font-weight:700}
.nav-item.active .cnt{background:var(--primary);color:#fff}
.nav-item.soon{opacity:.5}
.nav-item.soon:hover{background:transparent}
.nav-item .soontag{margin-inline-start:auto;font-size:9px;background:var(--bg-elev);padding:2px 7px;border-radius:999px;color:var(--tx-3)}
.suser{margin:auto 12px 14px;padding:12px;border-radius:var(--r-sm);background:var(--bg-elev);border:1px solid var(--bd-1);display:flex;align-items:center;gap:10px}
.suser .av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--teal-2));color:#fff;display:grid;place-items:center;font-size:14px;font-weight:700;flex:none}
.suser .info{min-width:0;flex:1}
.suser .info b{font-size:12.5px;color:var(--heading);display:block;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.suser .info small{font-size:10.5px;color:var(--tx-3)}
.suser .out{background:none;border:0;color:var(--tx-3);padding:5px;border-radius:8px;display:grid;place-items:center}
.suser .out:hover{background:var(--err-soft);color:var(--err)}
.suser .out svg{width:17px;height:17px}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.apptop{position:sticky;top:0;z-index:50;height:66px;display:flex;align-items:center;gap:14px;padding:0 26px;border-bottom:1px solid var(--bd-1);background:color-mix(in srgb,var(--bg-page) 84%,transparent);backdrop-filter:blur(10px)}
.search{flex:1;max-width:400px;position:relative}
.search input{width:100%;padding:10px 40px 10px 14px;border:1px solid var(--bd-1);border-radius:999px;font-size:13px;background:var(--bg-card);color:var(--tx-1)}
.search input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.search svg{position:absolute;inset-inline-start:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--tx-3)}
.spacer{flex:1}
.iconbtn{width:42px;height:42px;border-radius:50%;border:1px solid var(--bd-1);background:var(--bg-card);color:var(--navy-txt);display:grid;place-items:center;position:relative;transition:.15s}
.iconbtn:hover{background:var(--bg-elev)}
.iconbtn svg{width:19px;height:19px}
.iconbtn .dot{position:absolute;top:9px;inset-inline-end:10px;width:8px;height:8px;border-radius:50%;background:var(--err);border:2px solid var(--bg-card)}
.menu-btn{display:none}
.view{padding:26px;max-width:1240px;width:100%;margin:0 auto;animation:fadeUp .4s}
@media(max-width:920px){.sidebar{position:fixed;inset-inline-start:-280px;z-index:120;transition:.25s;box-shadow:var(--sh-xl)}.sidebar.open{inset-inline-start:0}.menu-btn{display:grid}.search{display:none}}

/* welcome banner */
.welcome{position:relative;overflow:hidden;border-radius:var(--r-lg);background:linear-gradient(115deg,#0F3446,#17475C 55%,#1E5A72);color:#fff;padding:26px 28px;margin-bottom:22px;box-shadow:var(--sh-md)}
.welcome::before{content:"";position:absolute;inset-inline:0;top:0;height:4px;background:linear-gradient(90deg,var(--gold),var(--teal-2))}
.welcome .wm{position:absolute;inset-inline-start:-10px;bottom:-40px;height:230px;opacity:.09;color:#fff}
.welcome .ey{color:var(--gold);font-size:12.5px;font-weight:600;letter-spacing:.4px}
.welcome h2{color:#fff;font-size:25px;margin:6px 0 4px}
.welcome p{color:#c7dbe0;font-size:13.5px;max-width:560px}
.welcome .mets{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.welcome .met{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:6px 15px;font-size:12.5px}
.welcome .met b{color:#fff}.welcome .met span{color:#9fc9be}

/* stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:15px;margin-bottom:22px}
.stat{background:var(--bg-card);border:1px solid var(--bd-1);border-radius:var(--r);padding:18px;box-shadow:var(--sh-sm)}
.stat .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.stat .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center}
.stat .ic svg{width:21px;height:21px}
.stat .trend{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
.stat .val{font-size:28px;font-weight:700;color:var(--heading);line-height:1}
.stat .lbl{font-size:12.5px;color:var(--tx-3);margin-top:5px}
.ic-teal{background:var(--primary-soft);color:var(--primary)}
.ic-gold{background:var(--gold-soft);color:var(--gold-2)}
.ic-navy{background:var(--navy-soft);color:var(--navy-txt)}
.ic-err{background:var(--err-soft);color:var(--err)}
.tr-up{background:var(--ok-soft);color:var(--ok)}.tr-dn{background:var(--err-soft);color:var(--err)}.tr-fl{background:var(--gold-soft);color:var(--gold-2)}

/* panels */
.grid2{display:grid;grid-template-columns:1.55fr 1fr;gap:20px;margin-bottom:20px}
.grid2.rev{grid-template-columns:1fr 1.55fr}
@media(max-width:900px){.grid2,.grid2.rev{grid-template-columns:1fr}}
.panel{background:var(--bg-card);border:1px solid var(--bd-1);border-radius:var(--r);box-shadow:var(--sh-sm);overflow:hidden;margin-bottom:20px}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 18px;border-bottom:1px solid var(--bd-1)}
.panel-head h3{font-size:15.5px;display:flex;align-items:center;gap:9px}
.panel-head .hic{width:32px;height:32px;border-radius:9px;background:var(--primary-soft);color:var(--primary);display:grid;place-items:center}
.panel-head .hic svg{width:17px;height:17px}
.panel-body{padding:6px 4px}
.panel-pad{padding:16px 18px}

/* dept performance */
.deptrow{padding:11px 18px}
.deptrow .t{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.deptrow .t b{color:var(--heading)}.deptrow .t span{color:var(--tx-3)}
.bar{height:8px;border-radius:6px;background:var(--bg-elev);overflow:hidden}
.bar i{display:block;height:100%;border-radius:6px}

/* list rows */
.lrow{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--bd-1)}
.lrow:last-child{border-bottom:0}
.lrow .li{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex:none}
.lrow .li svg{width:18px;height:18px}
.lrow .lc{min-width:0;flex:1}
.lrow .lc b{font-size:13px;color:var(--heading);display:block}
.lrow .lc small{font-size:11.5px;color:var(--tx-3)}
.lrow .lt{font-size:11px;color:var(--tx-3);white-space:nowrap}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--navy);color:#fff;text-align:right;padding:11px 15px;font-size:12px;font-weight:600;white-space:nowrap}
thead th:first-child{border-start-start-radius:0}
tbody td{padding:11px 15px;border-bottom:1px solid var(--bd-1);vertical-align:middle}
tbody tr:last-child td{border-bottom:0}
tbody tr.rowlink{cursor:pointer;transition:.12s}
tbody tr.rowlink:hover{background:var(--bg-elev)}
.who{display:flex;align-items:center;gap:9px}
.who .av{width:32px;height:32px;border-radius:50%;background:var(--primary-soft);color:var(--primary);display:grid;place-items:center;font-size:12px;font-weight:700;flex:none}
.who b{font-size:13px;color:var(--heading);display:block;line-height:1.25}
.who small{font-size:11px;color:var(--tx-3)}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;white-space:nowrap}
.b-ok{background:var(--ok-soft);color:var(--primary-hov)}
.b-warn{background:var(--gold-soft);color:var(--gold-2)}
.b-err{background:var(--err-soft);color:var(--err)}
.b-navy{background:var(--navy-soft);color:var(--navy-txt)}
.b-mut{background:var(--bg-elev);color:var(--tx-3)}
.dotp{width:7px;height:7px;border-radius:50%;display:inline-block}
.prio-عالية{color:var(--err)}.prio-متوسطة{color:var(--gold-2)}.prio-منخفضة{color:var(--navy-3)}
.tabs{display:flex;gap:6px;padding:12px 16px 0;flex-wrap:wrap}
.tab{padding:8px 15px;font-size:12.5px;font-weight:600;border-radius:var(--r-sm) var(--r-sm) 0 0;color:var(--tx-3);cursor:pointer;border:1px solid transparent;border-bottom:0}
.tab.active{color:var(--primary);background:var(--primary-soft)}
.empty{text-align:center;color:var(--tx-3);padding:36px 10px;font-size:13px}
.rolebar{display:flex;align-items:center;gap:10px;background:var(--gold-soft);border:1px solid var(--bd-1);border-radius:var(--r);padding:11px 15px;font-size:12.5px;color:var(--gold-2);margin-bottom:20px}
.rolebar svg{width:17px;height:17px;flex:none}
.backbtn{margin-bottom:14px}
.backbtn svg{width:14px;height:14px}

/* kpi small */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:var(--bg-card);border:1px solid var(--bd-1);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh-sm);position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;inset-block:0;inset-inline-end:0;width:4px;background:var(--primary)}
.kpi.gold::after{background:var(--gold)}.kpi.navy::after{background:var(--navy-3)}.kpi.err::after{background:var(--err)}
.kpi .lbl{font-size:12px;color:var(--tx-3);margin-bottom:6px}
.kpi .val{font-size:26px;font-weight:700;color:var(--heading);line-height:1}
.kpi .sub{font-size:11px;color:var(--tx-3);margin-top:5px}

/* project cards */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;padding:14px}
.pcard{background:var(--bg-card);border:1px solid var(--bd-1);border-top:3px solid var(--gold);border-radius:var(--r);padding:18px;cursor:pointer;transition:.18s;box-shadow:var(--sh-sm)}
.pcard:hover{transform:translateY(-3px);box-shadow:var(--sh-md)}
.pcard .pt{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.pcard .pt b{color:var(--heading);font-size:15.5px}
.prog{height:8px;border-radius:6px;background:var(--bg-elev);overflow:hidden}
.prog i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--primary),var(--teal-2))}

/* stepper */
.stepper{display:flex;flex-wrap:wrap;gap:4px;padding:8px 0}
.step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:84px}
.step .cn{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:700;background:var(--bg-elev);color:var(--tx-3);border:2px solid var(--bd-1)}
.step.done .cn{background:var(--primary);color:#fff;border-color:var(--primary)}
.step.cur .cn{background:var(--gold);color:var(--on-gold);border-color:var(--gold)}
.step small{font-size:10.5px;color:var(--tx-3);text-align:center;line-height:1.3}
.step.done small,.step.cur small{color:var(--heading);font-weight:600}

/* kv */
.kv{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px dashed var(--bd-1);font-size:13.5px}
.kv:last-child{border-bottom:0}
.kv .k{color:var(--tx-3)}.kv .v{color:var(--heading);font-weight:600;text-align:left}

/* ===== QUOTE ENGINE ===== */
.qgrid{display:grid;grid-template-columns:1fr 372px;gap:18px;align-items:start}
@media(max-width:1000px){.qgrid{grid-template-columns:1fr}}
.qcard{background:var(--bg-card);border:1px solid var(--bd-1);border-radius:var(--r);box-shadow:var(--sh-sm);padding:20px;margin-bottom:16px}
.qcard h2{font-size:16.5px;color:var(--heading);margin-bottom:3px}
.qcard .qsub{font-size:12.5px;color:var(--tx-3);margin-bottom:14px}
.eyebrow{display:inline-block;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--primary);background:var(--primary-soft);padding:4px 11px;border-radius:999px;margin-bottom:9px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
@media(max-width:640px){.row3{grid-template-columns:1fr}}
.modes{display:flex;gap:8px}
.mode{flex:1;border:1.5px solid var(--bd-1);border-radius:12px;padding:11px 8px;text-align:center;cursor:pointer;transition:.18s;background:var(--bg-card)}
.mode b{display:block;font-size:13.5px;color:var(--tx-1)}
.mode small{font-size:10.5px;color:var(--tx-3)}
.mode.on{border-color:var(--primary);background:var(--primary-soft)}
.mode.on b{color:var(--primary-hov)}
.pinfo{margin-top:10px;background:var(--navy-soft);border-radius:11px;padding:11px 13px;font-size:12px;color:var(--navy-txt);line-height:1.9}
.svc{border:1px solid var(--bd-1);border-radius:13px;margin-bottom:10px;background:var(--bg-card);transition:.2s;overflow:hidden}
.svc.on{border-color:var(--primary)}
.svc.off .sh{opacity:.55}
.svc.hidden-mode{display:none}
.sh{display:flex;align-items:center;gap:11px;padding:12px 14px}
.sh .ico{width:34px;height:34px;border-radius:9px;background:var(--navy-soft);color:var(--navy-txt);display:grid;place-items:center;flex:none;font-size:15px}
.svc.on .sh .ico{background:var(--primary);color:#fff}
.sh .nm{min-width:0}
.sh .nm b{display:block;font-size:13.5px;color:var(--heading);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sh .nm small{font-size:10.5px;color:var(--tx-3)}
.sh .cost{margin-inline-start:auto;font-weight:700;color:var(--heading);font-size:13.5px;white-space:nowrap}
.svc.off .cost{color:var(--tx-3);text-decoration:line-through}
.sw{width:40px;height:23px;border-radius:999px;background:var(--bd-2);position:relative;cursor:pointer;flex:none;transition:.2s}
.sw::after{content:"";position:absolute;top:3px;inset-inline-start:3px;width:17px;height:17px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.svc.on .sw{background:var(--primary)}
.svc.on .sw::after{transform:translateX(-17px)}
.xbtn{width:27px;height:27px;border-radius:8px;border:1px solid var(--bd-1);background:var(--bg-card);color:var(--navy-txt);font-size:17px;line-height:1;cursor:pointer;flex:none;transition:.18s;display:grid;place-items:center;font-weight:600}
.xbtn:hover{background:var(--gold-soft);border-color:var(--gold);color:var(--gold-2)}
.svc.open .xbtn{transform:rotate(45deg);background:var(--navy);color:#fff;border-color:var(--navy)}
.sb{display:none;padding:0 14px 14px;border-top:1px dashed var(--bd-1);margin:0 14px;padding-top:12px}
.svc.open .sb{display:block}
.line{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12.5px;padding:3px 0}
.line .lbl{color:var(--tx-3)}
.line .val{font-weight:700;color:var(--navy-txt)}
.inp-sm{width:88px;border:1px solid var(--bd-1);border-radius:8px;padding:5px 8px;text-align:center;font:700 13px 'IBM Plex Sans Arabic',sans-serif;color:var(--navy-txt);background:var(--bg-card)}
.inp-sm:focus{outline:0;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft)}
.desc{font-size:11.5px;color:var(--tx-3);margin-bottom:8px;line-height:1.8}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.chip{font-size:10.5px;background:var(--navy-soft);color:var(--navy-txt);padding:3px 9px;border-radius:999px;font-weight:600}
.mode-note{font-size:10.5px;color:var(--gold-2);background:var(--gold-soft);border-radius:7px;padding:3px 9px;display:inline-block;margin-top:7px;font-weight:600}
.inv{position:sticky;top:82px}
.tot{display:flex;align-items:center;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid var(--bd-1)}
.tot .k{color:var(--tx-3)}.tot .v{font-weight:700;color:var(--heading)}
.tot.sum{border-top:2px solid var(--primary-soft);border-bottom:0;margin-top:5px;padding-top:11px}
.grand{background:var(--navy);color:#fff;border-radius:13px;padding:15px;text-align:center;margin-top:12px}
.grand p{margin:0;font-size:12px;color:#b9d3dc}
.grand b{font-size:26px;font-weight:700;color:var(--gold);display:block;margin-top:3px}
.grand small{font-size:11px;color:#b9d3dc}
.hint{font-size:11px;color:var(--tx-3);margin-top:9px;line-height:1.7}
.adv{background:linear-gradient(160deg,var(--primary-soft),var(--bg-card));border:1px solid var(--bd-1)}
.adv ul{margin:6px 0 0;padding:0;list-style:none}
.adv li{font-size:12px;color:var(--tx-1);padding:6px 0;border-bottom:1px dashed var(--bd-1);line-height:1.75;display:flex;gap:7px}
.adv li:last-child{border-bottom:0}
.adv li::before{content:"◆";color:var(--gold);font-size:9px;margin-top:5px;flex:none}

/* org */
.onode2{background:linear-gradient(135deg,var(--navy),var(--navy-2));color:#fff;border-radius:11px;padding:10px 22px;font-weight:600;font-size:13.5px;text-align:center;box-shadow:var(--sh-sm)}
.oc{width:2px;height:16px;background:var(--bd-2)}
.odept2{background:var(--bg-card);border:1px solid var(--bd-1);border-top:3px solid var(--primary);border-radius:11px;padding:9px 12px;font-weight:600;font-size:12px;color:var(--heading);text-align:center;box-shadow:var(--sh-sm)}
.odept2.pmo{border-top-color:var(--gold);background:var(--gold-soft)}
.subrole2{background:var(--bg-card);border:1px dashed var(--primary);color:var(--primary);border-radius:9px;padding:6px 11px;font-size:11.5px;font-weight:600}
.sw.onx::after{transform:translateX(-17px)}

/* modal */
.scrim{position:fixed;inset:0;background:rgba(8,28,38,.55);z-index:150;display:grid;place-items:center;padding:20px;animation:fadeUp .2s}
.modal{background:var(--bg-card);border-radius:18px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:var(--sh-xl)}
.modal.wide{max-width:640px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--bd-1);position:sticky;top:0;background:var(--bg-card);z-index:2}
.modal-head h3{font-size:17px}
.modal-head .x{background:none;border:0;color:var(--tx-3);font-size:22px;line-height:1;padding:2px 8px;border-radius:8px}
.modal-head .x:hover{background:var(--bg-elev)}
.modal-body{padding:20px 22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--bd-1);display:flex;gap:10px}

/* toast */
.toast{position:fixed;inset-block-end:22px;inset-inline-start:50%;transform:translateX(50%) translateY(20px);background:var(--navy);color:#fff;padding:11px 20px;border-radius:999px;font-size:13px;font-weight:600;box-shadow:var(--sh-md);opacity:0;transition:.25s;z-index:300;pointer-events:none}
.toast.show{opacity:1;transform:translateX(50%) translateY(0)}
.toast svg{width:16px;height:16px;vertical-align:-3px;margin-inline-end:6px}
.foot-note{text-align:center;color:var(--tx-3);font-size:11.5px;padding:20px 0 6px}
/* ===== RESPONSIVE ===== */
.sscrim{display:none}
@media(max-width:920px){
  .sscrim.show{display:block;position:fixed;inset:0;background:rgba(8,28,38,.5);z-index:110;animation:fadeUp .2s}
  .view{padding:18px 15px}
  .apptop{padding:0 14px;gap:8px;height:60px}
  .welcome{padding:20px 18px;border-radius:16px}
  .welcome h2{font-size:20px}
  .welcome .wm{height:170px}
  .panel-body{overflow-x:auto}
  .qgrid .inv{position:static}
}
@media(max-width:600px){
  .view{padding:14px 12px}
  .stat-grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px}
  .stat{padding:14px}
  .stat .val{font-size:22px}
  .welcome h2{font-size:18px}
  .welcome .mets{gap:7px}
  .modal{max-width:100%}
  thead th,tbody td{padding:9px 10px;font-size:12px}
  .panel-head{padding:14px 15px}
  .panel-head h3{font-size:14px}
  #primeBtn span{display:none}
  #primeBtn{padding:10px 12px}
  .row2,.row3{grid-template-columns:1fr}
  .modal-foot{flex-wrap:wrap}
}
@media(max-width:400px){
  .apptop .iconbtn{width:38px;height:38px}
  .stat-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>

/* ================= HELPERS ================= */
function emp(id){for(var i=0;i<EMP.length;i++)if(EMP[i].id===id)return EMP[i];return null;}

function projName(id){var p=projById(id);return p?p.name:'';}
function partnerById(id){for(var i=0;i<PARTNERS.length;i++)if(PARTNERS[i].id===id)return PARTNERS[i];return null;}
function initials(n){return (n||'').replace('أبو ','').charAt(0);}
function me(){return emp(state.uid);}
function daysTo(d){return Math.round((new Date(d)-TODAY)/86400000);}
function isOverdue(t){return t.status!=='منجزة'&&new Date(t.due)<TODAY;}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(n){return Math.round(n).toLocaleString('en-US');}
function statusOf(e){return e.st?e.st:(e.att>=85?'نشط':'—');}

function canSee(k){var p=perm();if(k==='finance')return p.fin;if(k==='quote')return p.quote;return true;}
function navCount(k){if(k==='tasks')return myTasks().filter(function(t){return t.status!=='منجزة';}).length;if(k==='partners')return PARTNERS.length;if(k==='projects')return (me().role==='pm')?1:PROJECTS.length;return 0;}
function renderNav(){
  var h='';
  NAVGROUPS.forEach(function(g){
    var vis=g.items.filter(function(n){return canSee(n.k);});
    if(!vis.length)return;
    h+='<div class="navlbl">'+g.lbl+'</div>';
    vis.forEach(function(n){
      var act=state.view===n.k||(n.k==='projects'&&state.view==='project')||(n.k==='partners'&&state.view==='partner');
      var c=navCount(n.k);
      h+='<div class="nav-item'+(act?' active':'')+'" onclick="go(\''+n.k+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">'+n.i+'</svg>'+n.t+(c?'<span class="cnt">'+c+'</span>':'')+'</div>';
    });
  });
  document.getElementById('nav').innerHTML=h;
}

/* primary button per screen */
function primeConfig(){
  var p=perm(),v=state.view;
  if(v==='team'&&p.addEmp)return{t:'موظف جديد',fn:'openAddEmp()'};
  if((v==='projects'||v==='project')&&['gm','exec','pmo'].indexOf(me().role)>=0)return{t:'فتح مشروع',fn:'openNewProject()'};
  if((v==='partners'||v==='partner')&&p.partnersEdit)return{t:'جهة جديدة',fn:'openAddPartner()'};
  if(v==='tasks'&&p.assign!=='self')return{t:'تكليف جديد',fn:'openAssignForm()'};
  if(v==='quote')return{t:'توليد العرض',fn:'genQuote()'};

}

/* ================= RENDER ================= */
function render(){
  var m=me();applyTheme();
  document.getElementById('uName').textContent=m.name;
  document.getElementById('uRole').textContent=ROLES[m.role];
  document.getElementById('uAv').textContent=initials(m.name);
  renderNav();
  var pc=primeConfig(),pb=document.getElementById('primeBtn');
  if(pc){pb.classList.remove('hide');pb.querySelector('span').textContent=pc.t;pb.setAttribute('onclick',pc.fn);}else{pb.classList.add('hide');}
  var el=document.getElementById('view'),v=state.view;
  if(v==='dashboard')el.innerHTML=viewDashboard();
  else if(v==='team')el.innerHTML=viewTeam();
  else if(v==='projects')el.innerHTML=viewProjects();
  else if(v==='project')el.innerHTML=viewProject();
  else if(v==='partners')el.innerHTML=viewPartners();
  else if(v==='partner')el.innerHTML=viewPartner();
  else if(v==='finance')el.innerHTML=viewFinance();
  else if(v==='tasks')el.innerHTML=viewAssign();
  else if(v==='quote'){el.innerHTML=viewQuote();initQuote();}
  else if(v==='reports')el.innerHTML=viewReports();
  else if(v==='org')el.innerHTML=viewOrg();
  else if(v==='settings')el.innerHTML=viewSettings();
  else if(v.indexOf('sup_')===0)el.innerHTML=viewSupport(v.slice(4));
  saveDB();
}

function qState(){var st={items:[],sub:0};SERVICES.forEach(function(s){var d=document.querySelector('.svc[data-id="'+s.id+'"]');if(!d)return;var r=qSvcCost(s,d);d.querySelectorAll('[data-cost]').forEach(function(e){e.textContent=fmt(r.cost);});var qe=d.querySelector('[data-q="qty"]');if(qe)qe.textContent=fmt(r.qty||0);var xe=d.querySelector('[data-q="extra"]');if(xe)xe.textContent=fmt(r.extra||0);if(d.classList.contains('on')&&!d.classList.contains('hidden-mode')&&r.cost>0){st.items.push({s:s,d:d,cost:r.cost,r:r});st.sub+=r.cost;}});st.disc=Math.min(qval('fDiscount'),st.sub);st.afterDisc=st.sub-st.disc;st.opsPc=qval('pOps');st.ops=Math.round(st.afterDisc*st.opsPc/100-0.0001);st.net=st.afterDisc+st.ops;st.vat=Math.round(st.net*0.15-0.0001);st.grand=st.net+st.vat;return st;}

function roleOptions(sel){return Object.keys(ROLES).map(function(r){return '<option value="'+r+'"'+(r===sel?' selected':'')+'>'+ROLES[r]+'</option>';}).join('');}
function mgrOptions(sel){return '<option value="">— بدون —</option>'+EMP.map(function(e){return '<option value="'+e.id+'"'+(e.id===sel?' selected':'')+'>'+e.name+'</option>';}).join('');}
function openEditEmp(id){var e=emp(id);openModal('تعديل الموظف','<div class="field"><label>الاسم</label><input id="edName" value="'+esc(e.name)+'"></div><div class="field"><label>الدور</label><select id="edRole">'+roleOptions(e.role)+'</select></div><div class="field"><label>الرئيس المباشر</label><select id="edMgr">'+mgrOptions(e.mgr)+'</select></div><div class="field"><label>الجوال</label><input id="edPhone" class="num" value="'+e.phone+'"></div><div class="field"><label>نهاية العقد</label><input id="edContract" type="date" value="'+e.contract+'"></div><div class="field"><label>نسبة الحضور %</label><input id="edAtt" type="number" min="0" max="100" value="'+e.att+'"></div>','<button class="btn btn-ghost btn-sm" onclick="closeModal()">إلغاء</button><button class="btn btn-primary btn-sm" onclick="saveEditEmp(\''+id+'\')">حفظ</button>');}
function saveEditEmp(id){var e=emp(id);var n=document.getElementById('edName').value.trim();if(!n){toast('الاسم مطلوب');return;}e.name=n;e.role=document.getElementById('edRole').value;e.mgr=document.getElementById('edMgr').value;e.phone=document.getElementById('edPhone').value;e.contract=document.getElementById('edContract').value;e.att=parseInt(document.getElementById('edAtt').value)||0;closeModal();render();toast('تم حفظ التعديلات');}
function deleteEmp(id){confirmDo('حذف «'+emp(id).name+'» نهائيًّا؟','حذف','doDeleteEmp(\''+id+'\')');}
function doDeleteEmp(id){var n=emp(id).name;EMP=EMP.filter(function(e){return e.id!==id;});logAct('حذف الموظف: '+n,'check');closeModal();render();toast('تم حذف '+n);}

function openEditProject(id){var pr=projById(id),m=PROJ_META[id]||{};var pmOpts=EMP.filter(function(e){return e.role==='pm'||e.role==='pmo';}).map(function(e){return '<option value="'+e.id+'"'+(e.id===pr.pm?' selected':'')+'>'+e.name+'</option>';}).join('');openModal('تعديل المشروع','<div class="field"><label>اسم المشروع</label><input id="epName" value="'+esc(pr.name)+'"></div><div class="field"><label>الجهة</label><input id="epEnt" value="'+esc(m.entity==='—'?'':(m.entity||''))+'"></div><div class="field"><label>مدير المشروع</label><select id="epPm">'+pmOpts+'</select></div><div class="field"><label>نسبة الإنجاز %</label><input id="epProg" type="number" min="0" max="100" value="'+pr.progress+'"></div><div class="field"><label>الموازنة (ريال)</label><input id="epBudget" type="number" value="'+(m.budget||0)+'"></div><div class="field"><label>تاريخ الانطلاق</label><input id="epStart" type="date" value="'+(m.start||'2026-01-01')+'"></div>','<button class="btn btn-ghost btn-sm" onclick="closeModal()">إلغاء</button><button class="btn btn-primary btn-sm" onclick="saveEditProject(\''+id+'\')">حفظ</button>');}
function saveEditProject(id){var pr=projById(id);pr.name=document.getElementById('epName').value.trim()||pr.name;pr.pm=document.getElementById('epPm').value;pr.progress=Math.max(0,Math.min(100,parseInt(document.getElementById('epProg').value)||0));PROJ_META[id]=PROJ_META[id]||{};PROJ_META[id].entity=document.getElementById('epEnt').value||'—';PROJ_META[id].budget=parseInt(document.getElementById('epBudget').value)||0;PROJ_META[id].start=document.getElementById('epStart').value;closeModal();render();toast('تم حفظ المشروع');}
function deleteProject(id){confirmDo('حذف مشروع «'+projName(id)+'»؟','حذف','doDeleteProject(\''+id+'\')');}
function doDeleteProject(id){var n=projName(id);PROJECTS=PROJECTS.filter(function(p){return p.id!==id;});delete PROJ_META[id];logAct('حذف المشروع: '+n,'folder');closeModal();state.view='projects';render();toast('تم حذف المشروع');}

function openEditPartner(id){var g=partnerById(id);openModal('تعديل الجهة','<div class="field"><label>اسم الجهة</label><input id="egName" value="'+esc(g.name)+'"></div><div class="field"><label>النوع</label><select id="egType">'+['جمعية','جهة حكومية','صندوق عائلي','مدرسة'].map(function(x){return '<option'+(x===g.type?' selected':'')+'>'+x+'</option>';}).join('')+'</select></div><div class="field"><label>جهة الاتصال</label><input id="egContact" value="'+esc(g.contact)+'"></div><div class="field"><label>مرحلة الرحلة (1-7)</label><input id="egStep" type="number" min="1" max="7" value="'+g.step+'"></div><div class="field"><label>الحالة</label><select id="egStatus">'+['تواصل','قيد التعاقد','نشطة','متوقفة'].map(function(x){return '<option'+(x===g.status?' selected':'')+'>'+x+'</option>';}).join('')+'</select></div><div class="field"><label>قيمة العقد (ريال)</label><input id="egValue" type="number" value="'+(g.value||0)+'"></div>','<button class="btn btn-ghost btn-sm" onclick="closeModal()">إلغاء</button><button class="btn btn-primary btn-sm" onclick="saveEditPartner(\''+id+'\')">حفظ</button>');}
function saveEditPartner(id){var g=partnerById(id);g.name=document.getElementById('egName').value.trim()||g.name;g.type=document.getElementById('egType').value;g.contact=document.getElementById('egContact').value;g.step=Math.max(1,Math.min(7,parseInt(document.getElementById('egStep').value)||1));g.status=document.getElementById('egStatus').value;g.value=parseInt(document.getElementById('egValue').value)||0;closeModal();render();toast('تم حفظ الجهة');}
function deletePartner(id){confirmDo('حذف «'+partnerById(id).name+'»؟','حذف','doDeletePartner(\''+id+'\')');}
function doDeletePartner(id){var n=partnerById(id).name;PARTNERS=PARTNERS.filter(function(g){return g.id!==id;});logAct('حذف الجهة: '+n,'handshake');closeModal();state.view='partners';render();toast('تم حذف الجهة');}
function advancePartner(id){var g=partnerById(id);if(g.step<7){g.step++;if(g.step===7)g.status='نشطة';logAct('تقدّمت شراكة «'+g.name+'» إلى: '+STEPS[g.step-1],'handshake');render();toast('تقدّمت إلى: '+STEPS[g.step-1]);}else toast('اكتملت الرحلة');}

function openEditTask(id){var t=null;TASKS.forEach(function(x){if(x.id===id)t=x;});if(!t)return;var eOpts=EMP.map(function(e){return '<option value="'+e.id+'"'+(e.id===t.emp?' selected':'')+'>'+e.name+'</option>';}).join('');var pOpts='<option value="">— بدون —</option>'+PROJECTS.map(function(pr){return '<option value="'+pr.id+'"'+(pr.id===t.proj?' selected':'')+'>'+pr.name+'</option>';}).join('');openModal('تعديل التكليف','<div class="field"><label>العنوان</label><input id="etTitle" value="'+esc(t.t)+'"></div><div class="field"><label>المكلَّف</label><select id="etEmp">'+eOpts+'</select></div><div class="field"><label>المصدر</label><select id="etType">'+['مشروع','إداري','شراكة'].map(function(x){return '<option'+(x===t.type?' selected':'')+'>'+x+'</option>';}).join('')+'</select></div><div class="field"><label>المشروع</label><select id="etProj">'+pOpts+'</select></div><div class="field"><label>الأولوية</label><select id="etPrio">'+['عالية','متوسطة','منخفضة'].map(function(x){return '<option'+(x===t.prio?' selected':'')+'>'+x+'</option>';}).join('')+'</select></div><div class="field"><label>التسليم</label><input id="etDue" type="date" value="'+t.due+'"></div>','<button class="btn btn-ghost btn-sm" onclick="closeModal()">إلغاء</button><button class="btn btn-primary btn-sm" onclick="saveEditTask(\''+id+'\')">حفظ</button>');}
function saveEditTask(id){var t=null;TASKS.forEach(function(x){if(x.id===id)t=x;});if(!t)return;t.t=document.getElementById('etTitle').value.trim()||t.t;t.emp=document.getElementById('etEmp').value;t.type=document.getElementById('etType').value;t.proj=document.getElementById('etProj').value;t.prio=document.getElementById('etPrio').value;t.due=document.getElementById('etDue').value;closeModal();render();toast('تم حفظ التكليف');}
function deleteTask(id){confirmDo('حذف هذا التكليف؟','حذف','doDeleteTask(\''+id+'\')');}
function doDeleteTask(id){TASKS=TASKS.filter(function(t){return t.id!==id;});closeModal();render();toast('تم حذف التكليف');}

function openAddFin(){openModal('قيد مالي جديد','<div class="field"><label>النوع</label><select id="fnType"><option>إيراد</option><option>صرف</option></select></div><div class="field"><label>البيان</label><input id="fnDesc" placeholder="مثال: دفعة عقد جمعية…"></div><div class="field"><label>التصنيف</label><input id="fnCat" placeholder="شراكات / رواتب / تشغيلية…"></div><div class="field"><label>المبلغ (ريال)</label><input id="fnAmt" type="number" value="0"></div><div class="field"><label>التاريخ</label><input id="fnDate" type="date" value="2026-07-16"></div>','<button class="btn btn-ghost btn-sm" onclick="closeModal()">إلغاء</button><button class="btn btn-primary btn-sm" onclick="saveFin()">حفظ</button>');}
function saveFin(){var d=document.getElementById('fnDesc').value.trim();if(!d){toast('البيان مطلوب');return;}FIN.unshift({id:'f'+(++_seq),type:document.getElementById('fnType').value,desc:d,cat:document.getElementById('fnCat').value||'أخرى',amount:parseInt(document.getElementById('fnAmt').value)||0,date:document.getElementById('fnDate').value});logAct('قيد مالي: '+d,'coins');closeModal();render();toast('تمت إضافة القيد');}
function deleteFin(id){FIN=FIN.filter(function(x){return x.id!==id;});render();toast('تم حذف القيد');}

function openLeaveReq(){openModal('طلب إجازة','<div class="field"><label>النوع</label><select id="lrType"><option>اعتيادية</option><option>استئذان</option><option>مرضية</option></select></div><div class="field"><label>من</label><input id="lrFrom" type="date" value="2026-07-20"></div><div class="field"><label>إلى</label><input id="lrTo" type="date" value="2026-07-21"></div>','<button class="btn btn-ghost btn-sm" onclick="closeModal()">إلغاء</button><button class="btn btn-primary btn-sm" onclick="saveLeaveReq()">إرسال الطلب</button>');}
function saveLeaveReq(){LEAVES.unshift({id:'l'+(++_seq),emp:state.uid,type:document.getElementById('lrType').value,from:document.getElementById('lrFrom').value,to:document.getElementById('lrTo').value,status:'معلّقة'});logAct('طلب إجازة من '+me().name,'check');closeModal();render();toast('تم إرسال طلب الإجازة');}
function approveItem(i){var a=APPROVALS[i];if(!a)return;logAct('اعتماد: '+a.t,'check');APPROVALS.splice(i,1);render();toast('تم الاعتماد');}
function submitReport(i){var r=REPORTS[i];if(!r)return;r.status='مقدَّم';logAct('رفع تقرير: '+r.t,'folder');render();toast('تم رفع التقرير');}
/*ACTIONS*/

/* ================= PERSISTENCE (local, on-device) ================= */
var DBKEY='hilal_db_v1';var PROFILE={};
function dbSnapshot(){return {employees:EMP,projects:PROJECTS,projMeta:PROJ_META,partners:PARTNERS,tasks:TASKS,leaves:LEAVES,finance:FIN,reports:REPORTS,approvals:APPROVALS,activities:ACTIVITIES,seq:_seq,profile:PROFILE,theme:state.theme};}
function saveDB(){try{localStorage.setItem(DBKEY,JSON.stringify(dbSnapshot()));}catch(e){}}
function loadDB(){try{var raw=localStorage.getItem(DBKEY);if(!raw)return false;var d=JSON.parse(raw);if(d.employees)EMP=d.employees;if(d.projects)PROJECTS=d.projects;if(d.projMeta)PROJ_META=d.projMeta;if(d.partners)PARTNERS=d.partners;if(d.tasks)TASKS=d.tasks;if(d.leaves)LEAVES=d.leaves;if(d.finance)FIN=d.finance;if(d.reports)REPORTS=d.reports;if(d.approvals)APPROVALS=d.approvals;if(d.activities)ACTIVITIES=d.activities;if(typeof d.seq==='number')_seq=d.seq;if(d.profile)PROFILE=d.profile;if(d.theme)state.theme=d.theme;return true;}catch(e){return false;}}
function logAct(t,ic){ACTIVITIES.unshift({t:t,time:'الآن',ic:ic||'check'});while(ACTIVITIES.length>12)ACTIVITIES.pop();}
function exportDB(){try{var data=JSON.stringify(dbSnapshot(),null,2);var blob=new Blob([data],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);var d=new Date();a.download='نسخة-احتياطية-حلل-'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'.json';document.body.appendChild(a);a.click();a.remove();toast('تم تنزيل نسخة احتياطية');}catch(e){toast('تعذّر التصدير');}}
function importDB(inp){var f=inp.files&&inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(){try{JSON.parse(r.result);localStorage.setItem(DBKEY,r.result);toast('تم الاسترجاع — إعادة التحميل…');setTimeout(function(){location.reload();},700);}catch(e){toast('ملف غير صالح');}};r.readAsText(f);}
function confirmReset(){openModal('إعادة التهيئة','<p style="color:var(--tx-2)">سيؤدي هذا إلى مسح كل التعديلات وإرجاع البيانات التجريبية الأصلية. لا يمكن التراجع.</p>','<button class="btn btn-ghost btn-sm" onclick="closeModal()">إلغاء</button><button class="btn btn-primary btn-sm" style="background:var(--err)" onclick="doReset()">نعم، أعد التهيئة</button>');}
function doReset(){try{localStorage.removeItem(DBKEY);}catch(e){}location.reload();}

/* ================= INIT ================= */
loadDB();fillLogin();applyTheme();
</script>
