services:
  - type: web
    name: hollal-platform
    runtime: docker
    rootDir: hollal-platform
    dockerfilePath: Dockerfile
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: warning
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_ENCRYPT
        value: "true"
      - key: SESSION_LIFETIME
        value: "60"
      - key: FILESYSTEM_DISK
        value: local
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: RUN_SEED
        value: "true"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DB_URL
        fromDatabase:
          name: hollal-mysql
          property: connectionString
      - key: ADMIN_INITIAL_PASSWORD
        sync: false

databases:
  - name: hollal-mysql
    plan: free
    databaseName: hollal
    user: hollal
